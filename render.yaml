# Render full-stack deployment — backend + frontend in one file.
#
# SETUP ORDER:
#   1. Go to dashboard.render.com → New → Blueprint → connect this repo
#   2. Render will detect this file and create both services automatically
#   3. Set the secret env vars marked sync: false in the Render dashboard:
#
#      vehiclecheck-backend:
#        DVLA_API_KEY        — your DVLA key
#        DVSA_CLIENT_ID      — from DVSA approval email
#        DVSA_CLIENT_SECRET  — from DVSA approval email
#        DVSA_API_KEY        — from DVSA approval email
#        ALLOWED_ORIGINS     — your frontend URL, e.g. https://vehiclecheck-frontend.onrender.com
#
#      vehiclecheck-frontend:
#        VITE_API_URL        — your backend URL, e.g. https://vehiclecheck-backend.onrender.com
#
#   4. Trigger a manual redeploy of the frontend after setting VITE_API_URL
#      (Vite bakes the URL into the bundle at build time)

services:

  # ── Backend — FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: vehiclecheck-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 60
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DVSA_SCOPE
        value: https://tapi.dvsa.gov.uk/.default
      - key: DVSA_TOKEN_URL
        value: https://login.microsoftonline.com/a455b827-244f-4c97-b5b4-ce5d13b4d00c/oauth2/v2.0/token
      - key: DVLA_API_KEY
        sync: false
      - key: DVSA_CLIENT_ID
        sync: false
      - key: DVSA_CLIENT_SECRET
        sync: false
      - key: DVSA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend — React/Vite static site ─────────────────────────────────────
  - type: static
    name: vehiclecheck-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
